<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cancha Gonsa | Resumen</title>
	<style>
		:root {
			--bg: #0b1020;
			--panel: rgba(19, 26, 46, 0.88);
			--line: rgba(110, 142, 198, 0.14);
			--text: #eef3ff;
			--muted: #8f9ab8;
			--green-soft: #7ce7a2;
			--green: #35c759;
			--yellow: #f4c430;
			--red: #ff5d5d;
			--blue: #53b8ff;
			--shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
			--radius-xl: 24px;
			--radius-lg: 18px;
			--radius-md: 14px;
			--max-width: 1400px;
		}

		* {
			box-sizing: border-box;
		}

		html {
			color-scheme: dark;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: Inter, "Segoe UI", Roboto, sans-serif;
			background:
				radial-gradient(circle at top, rgba(83, 184, 255, 0.12), transparent 30%),
				linear-gradient(180deg, #09101e 0%, #0b1020 100%);
			color: var(--text);
		}

		a {
			color: inherit;
			text-decoration: none;
		}

		.app-shell {
			width: min(calc(100% - 32px), var(--max-width));
			margin: 0 auto;
			padding: 28px 0 40px;
		}

		.hero {
			margin-bottom: 18px;
		}

		.hero h1 {
			margin: 0;
			font-size: clamp(2.2rem, 4vw, 3.4rem);
			line-height: 1;
		}

		.tabs {
			display: inline-flex;
			gap: 8px;
			padding: 8px;
			margin-bottom: 20px;
			flex-wrap: wrap;
			border-radius: 999px;
			border: 1px solid var(--line);
			background: rgba(19, 26, 46, 0.72);
			backdrop-filter: blur(16px);
		}

		.tab {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border-radius: 999px;
			padding: 11px 18px;
			background: transparent;
			color: var(--muted);
			font: inherit;
			transition: background 0.2s ease, color 0.2s ease;
		}

		.tab[aria-selected="true"] {
			background: linear-gradient(135deg, rgba(83, 184, 255, 0.16), rgba(83, 184, 255, 0.08));
			color: var(--text);
			box-shadow: inset 0 0 0 1px rgba(83, 184, 255, 0.18);
		}

		.panel {
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: var(--radius-xl);
			box-shadow: var(--shadow);
			backdrop-filter: blur(18px);
		}

		.filters-bar {
			display: flex;
			align-items: end;
			gap: 14px;
			padding: 18px 18px 0;
			flex-wrap: wrap;
		}

		.filter-field {
			display: grid;
			gap: 8px;
			min-width: 160px;
		}

		.filter-field--match {
			min-width: min(100%, 340px);
			flex: 1 1 320px;
		}

		.filter-field label {
			font-size: 0.76rem;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: #86bef8;
		}

		.filter-select {
			width: 100%;
			padding: 12px 14px;
			border-radius: 14px;
			border: 1px solid rgba(83, 184, 255, 0.14);
			background: rgba(8, 14, 26, 0.92);
			color: var(--text);
			font: inherit;
			outline: none;
			transition: border-color 0.2s ease, box-shadow 0.2s ease;
		}

		.filter-select:focus {
			border-color: rgba(83, 184, 255, 0.45);
			box-shadow: 0 0 0 3px rgba(83, 184, 255, 0.12);
		}

		.filters-summary {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
			margin-left: auto;
		}

		.filter-chip {
			padding: 10px 12px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.035);
			border: 1px solid rgba(255, 255, 255, 0.06);
			color: var(--muted);
			font-size: 0.88rem;
		}

		.filter-chip strong {
			color: var(--text);
		}

		.summary-shell {
			padding: 18px;
		}

		.match-head {
			display: grid;
			grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
			align-items: center;
			gap: 18px;
			padding: 22px;
			border-radius: 22px;
			background:
				linear-gradient(135deg, rgba(83, 184, 255, 0.09), rgba(83, 184, 255, 0.02)),
				rgba(255, 255, 255, 0.025);
			border: 1px solid rgba(83, 184, 255, 0.1);
		}

		.match-meta {
			display: grid;
			gap: 6px;
		}

		.match-meta__eyebrow {
			font-size: 0.76rem;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: #86bef8;
		}

		.match-meta__title {
			font-size: clamp(1.35rem, 2.4vw, 1.9rem);
			font-weight: 700;
			line-height: 1.05;
		}

		.match-meta__details {
			font-size: 0.95rem;
			color: var(--muted);
		}

		.match-meta__scorers {
			font-size: 0.9rem;
			color: #cbd5f2;
			line-height: 1.35;
		}

		.match-meta__scorers strong {
			color: #ffd84f;
			font-weight: 700;
		}

		.scoreboard-wrap {
			display: grid;
			justify-items: center;
			gap: 8px;
			grid-column: 2;
			justify-self: center;
		}

		.match-head__spacer {
			grid-column: 3;
			min-height: 1px;
		}

		.scoreboard {
			display: inline-flex;
			align-items: center;
			gap: 12px;
			padding: 16px 20px;
			border-radius: 20px;
			background: rgba(8, 14, 26, 0.72);
			border: 1px solid rgba(83, 184, 255, 0.14);
			box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
		}

		.scoreboard__separator {
			font-size: 1rem;
			font-weight: 800;
			color: rgba(255, 255, 255, 0.42);
		}

		.scoreboard__value {
			font-size: clamp(2.2rem, 5vw, 3.4rem);
			font-weight: 800;
			letter-spacing: -0.04em;
			line-height: 1;
		}

		.teams-grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 18px;
			padding-top: 18px;
		}

		.team-card {
			position: relative;
			border-radius: var(--radius-lg);
			background: rgba(255, 255, 255, 0.025);
			border: 1px solid rgba(255, 255, 255, 0.05);
			overflow: hidden;
			transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
		}

		.team-card::before {
			content: "";
			position: absolute;
			inset: 0 auto auto 0;
			width: 100%;
			height: 3px;
			background: transparent;
		}

		.team-card[data-result="winner"] {
			border-color: rgba(53, 199, 89, 0.26);
			box-shadow: 0 16px 34px rgba(19, 70, 35, 0.18), inset 0 0 0 1px rgba(53, 199, 89, 0.08);
			transform: translateY(-2px);
		}

		.team-card[data-result="winner"]::before {
			background: linear-gradient(90deg, rgba(53, 199, 89, 0.95), rgba(124, 231, 162, 0.5));
		}

		.team-card[data-result="loser"] {
			border-color: rgba(255, 93, 93, 0.18);
			box-shadow: inset 0 0 0 1px rgba(255, 93, 93, 0.06);
		}

		.team-card[data-result="loser"]::before {
			background: linear-gradient(90deg, rgba(255, 93, 93, 0.8), rgba(255, 93, 93, 0.25));
		}

		.team-card[data-result="draw"] {
			border-color: rgba(244, 196, 48, 0.2);
			box-shadow: inset 0 0 0 1px rgba(244, 196, 48, 0.06);
		}

		.team-card[data-result="draw"]::before {
			background: linear-gradient(90deg, rgba(244, 196, 48, 0.8), rgba(244, 196, 48, 0.25));
		}

		.team-card__head {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			padding: 18px;
			border-bottom: 1px solid rgba(255, 255, 255, 0.05);
			background: rgba(255, 255, 255, 0.015);
		}

		.team-card__label {
			display: flex;
			align-items: center;
		}

		.team-card__score {
			font-size: 2.3rem;
			font-weight: 800;
			letter-spacing: -0.05em;
		}

		.team-result-pill {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 8px 12px;
			border-radius: 999px;
			font-size: 0.82rem;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.06em;
		}

		.team-result-pill[data-result="winner"] {
			background: rgba(53, 199, 89, 0.12);
			color: var(--green-soft);
		}

		.team-result-pill[data-result="loser"] {
			background: rgba(255, 93, 93, 0.12);
			color: #ff8a8a;
		}

		.team-result-pill[data-result="draw"] {
			background: rgba(244, 196, 48, 0.12);
			color: var(--yellow);
		}

		.players-list {
			display: grid;
			gap: 0;
		}

		.player-row {
			display: grid;
			grid-template-columns: 1fr auto;
			align-items: center;
			gap: 14px;
			padding: 14px 18px;
			border-top: 1px solid rgba(255, 255, 255, 0.04);
		}

		.player-main {
			display: flex;
			align-items: center;
			gap: 12px;
			min-width: 0;
		}

		.player-avatar {
			width: 40px;
			height: 40px;
			border-radius: 14px;
			object-fit: cover;
			background: linear-gradient(135deg, #1d2949, #0f162a);
			border: 1px solid rgba(255, 255, 255, 0.08);
		}

		.player-info {
			min-width: 0;
		}

		.player-name {
			display: block;
			font-weight: 600;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}

		.player-sub {
			display: block;
			font-size: 0.82rem;
			color: var(--muted);
		}

		.player-events {
			display: inline-flex;
			align-items: center;
			justify-content: flex-end;
			gap: 8px;
			flex-wrap: wrap;
		}

		.goal-badge,
		.own-goal-badge {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 7px 10px;
			border-radius: 999px;
			font-size: 0.82rem;
			font-weight: 700;
		}

		.goal-badge {
			background: rgba(255, 212, 0, 0.12);
			color: #ffd84f;
		}

		.goal-badge__balls {
			letter-spacing: 0.02em;
			white-space: nowrap;
		}

		.goal-badge__extra {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 2px 7px;
			border-radius: 999px;
			background: rgba(0, 0, 0, 0.18);
			color: #fff1a8;
			font-size: 0.74rem;
			font-weight: 800;
			line-height: 1;
		}

		.own-goal-badge {
			background: rgba(255, 93, 93, 0.12);
			color: #ff9191;
		}

		.empty-state {
			padding: 42px 18px;
			text-align: center;
			color: var(--muted);
		}

		.empty-state strong {
			display: block;
			margin-bottom: 8px;
			color: var(--text);
			font-size: 1rem;
		}

		@media (max-width: 1000px) {
			.filters-summary {
				width: 100%;
				margin-left: 0;
			}

			.summary-shell {
				padding: 16px;
			}

			.teams-grid {
				grid-template-columns: 1fr;
			}
		}

		@media (max-width: 700px) {
			.app-shell {
				width: min(calc(100% - 20px), var(--max-width));
				padding-top: 20px;
			}

			.tabs {
				display: flex;
				flex-wrap: nowrap;
				overflow-x: auto;
				padding: 6px;
				margin-bottom: 16px;
				width: 100%;
				-webkit-overflow-scrolling: touch;
				scrollbar-width: none;
			}

			.tabs::-webkit-scrollbar {
				display: none;
			}

			.tab {
				white-space: nowrap;
				padding: 10px 14px;
				font-size: 0.92rem;
				flex: 0 0 auto;
			}

			.filters-bar {
				padding: 16px 16px 0;
				gap: 12px;
			}

			.filter-field,
			.filter-field--match {
				min-width: 100%;
				flex-basis: 100%;
			}

			.filters-summary {
				gap: 8px;
			}

			.filter-chip {
				width: 100%;
				display: inline-flex;
				justify-content: space-between;
			}

			.summary-shell {
				padding: 14px;
			}

			.match-head {
				grid-template-columns: 1fr;
				justify-items: start;
				gap: 14px;
				padding: 16px;
				border-radius: 18px;
			}

			.match-meta {
				gap: 5px;
			}

			.match-meta__title {
				font-size: clamp(1.2rem, 6vw, 1.6rem);
			}

			.match-meta__details,
			.match-meta__scorers {
				font-size: 0.86rem;
			}

			.scoreboard-wrap {
				width: 100%;
				grid-column: auto;
				justify-self: stretch;
			}

			.match-head__spacer {
				display: none;
			}

			.scoreboard {
				width: 100%;
				justify-content: center;
				padding: 14px 16px;
				border-radius: 16px;
			}

			.scoreboard__value {
				font-size: clamp(2rem, 12vw, 2.8rem);
			}

			.teams-grid {
				gap: 14px;
				padding-top: 14px;
			}

			.team-card__head {
				padding: 14px;
				gap: 10px;
			}

			.team-card__score {
				font-size: 2rem;
			}

			.team-result-pill {
				padding: 7px 10px;
				font-size: 0.76rem;
			}

			.player-row {
				grid-template-columns: 1fr;
				align-items: start;
				gap: 10px;
				padding: 12px 14px;
			}

			.player-main {
				gap: 10px;
			}

			.player-avatar {
				width: 36px;
				height: 36px;
				border-radius: 12px;
			}

			.player-name {
				font-size: 0.94rem;
			}

			.player-sub {
				font-size: 0.78rem;
			}

			.player-events {
				justify-content: flex-start;
				gap: 6px;
			}

			.goal-badge,
			.own-goal-badge {
				padding: 6px 9px;
				font-size: 0.78rem;
			}
		}

		@media (max-width: 520px) {
			.hero h1 {
				font-size: clamp(2rem, 10vw, 2.6rem);
			}

			.summary-shell {
				padding: 12px;
			}

			.match-head {
				padding: 14px;
			}

			.match-meta__title {
				font-size: clamp(1.1rem, 6vw, 1.4rem);
			}

			.match-meta__details,
			.match-meta__scorers {
				font-size: 0.82rem;
			}

			.scoreboard__value {
				font-size: clamp(1.9rem, 12vw, 2.4rem);
			}

			.team-card__head {
				padding: 12px;
			}

			.team-card__score {
				font-size: 1.8rem;
			}

			.player-row {
				padding: 12px;
			}

			.goal-badge,
			.own-goal-badge {
				width: 100%;
				justify-content: center;
			}
		}
	</style>
</head>
<body>
	<main class="app-shell">
		<section class="hero" aria-label="Encabezado principal">
			<h1>Cancha Gonsa ⚽</h1>
		</section>

		<nav class="tabs" aria-label="Secciones del sitio">
			<a class="tab" href="./tabla.html" aria-selected="false">Tabla General</a>
			<a class="tab" href="./Goleadores.html" aria-selected="false">Goleadores</a>
			<a class="tab" href="./Partidos.html" aria-selected="false">Partidos</a>
			<a class="tab" href="./Resumen.html" aria-selected="true">Resumen</a>
			<a class="tab" href="./Jugadores.html" aria-selected="false">Jugadores</a>
			<a class="tab" href="./Duelos.html" aria-selected="false">Duelos</a>
			<a class="tab" href="./Rachas.html" aria-selected="false">Rachas</a>
			<a class="tab" href="./Records.html" aria-selected="false">Récords</a>
			<a class="tab" href="./Palmares.html" aria-selected="false">Palmarés</a>
		</nav>

		<article class="panel">
			<div class="filters-bar" aria-label="Filtros de resumen">
				<div class="filter-field">
					<label for="js-filter-year">Año</label>
					<select class="filter-select" id="js-filter-year"></select>
				</div>

				<div class="filter-field">
					<label for="js-filter-month">Mes</label>
					<select class="filter-select" id="js-filter-month"></select>
				</div>

				<div class="filter-field filter-field--match">
					<label for="js-filter-match">Partido</label>
					<select class="filter-select" id="js-filter-match"></select>
				</div>

				<div class="filters-summary" aria-live="polite">
					<span class="filter-chip">Año: <strong id="js-active-year">--</strong></span>
					<span class="filter-chip">Mes: <strong id="js-active-month">--</strong></span>
					<span class="filter-chip">Partido: <strong id="js-active-match">--</strong></span>
				</div>
			</div>

			<div class="summary-shell" id="js-summary-shell">
				<div class="empty-state">
					<strong>Preparando resumen del partido</strong>
					La conexión con Google Sheets se ejecuta al cargar la página.
				</div>
			</div>
		</article>
	</main>

	<script src="./lector_datos.js"></script>
	<script src="./Resumen.js"></script>
</body>
</html>
