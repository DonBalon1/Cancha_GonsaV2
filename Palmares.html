<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cancha Gonsa | Palmarés</title>
	<style>
		:root {
			--bg: #0b1020;
			--panel: rgba(19, 26, 46, 0.88);
			--line: rgba(110, 142, 198, 0.14);
			--text: #eef3ff;
			--muted: #8f9ab8;
			--blue: #53b8ff;
			--violet: #c8b7ff;
			--gold: #f6c768;
			--green-soft: #7ce7a2;
			--yellow: #f4c430;
			--red-soft: #ff8b8b;
			--shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
			--radius-xl: 24px;
			--radius-lg: 18px;
			--radius-md: 14px;
			--max-width: 1400px;
		}

		* { box-sizing: border-box; }
		html { color-scheme: dark; }
		body {
			margin: 0;
			min-height: 100vh;
			font-family: Inter, "Segoe UI", Roboto, sans-serif;
			background:
				radial-gradient(circle at top, rgba(246, 199, 104, 0.13), transparent 26%),
				radial-gradient(circle at right, rgba(83, 184, 255, 0.10), transparent 24%),
				linear-gradient(180deg, #09101e 0%, #0b1020 100%);
			color: var(--text);
		}
		a { color: inherit; text-decoration: none; }

		.app-shell {
			width: min(calc(100% - 32px), var(--max-width));
			margin: 0 auto;
			padding: 28px 0 40px;
		}

		.hero { margin-bottom: 18px; }
		.hero h1 { margin: 0; font-size: clamp(2.2rem, 4vw, 3.4rem); line-height: 1; }

		.site-title h1 {
			margin: 0;
			font-size: clamp(2.2rem, 4vw, 3.4rem);
			line-height: 1;
		}

		.tabs {
			display: inline-flex;
			gap: 8px;
			padding: 8px;
			margin-bottom: 20px;
			flex-wrap: wrap;
			border-radius: 999px;
			border: 1px solid var(--line);
			background: rgba(19, 26, 46, 0.72);
			backdrop-filter: blur(16px);
		}

		.tab {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border-radius: 999px;
			padding: 11px 18px;
			background: transparent;
			color: var(--muted);
			font: inherit;
			transition: background 0.2s ease, color 0.2s ease;
		}

		.tab[aria-selected="true"] {
			background: linear-gradient(135deg, rgba(246, 199, 104, 0.18), rgba(83, 184, 255, 0.10));
			color: var(--text);
			box-shadow: inset 0 0 0 1px rgba(246, 199, 104, 0.16);
		}

		.panel {
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: var(--radius-xl);
			box-shadow: var(--shadow);
			backdrop-filter: blur(18px);
		}

		.palmares-shell {
			display: grid;
			gap: 18px;
		}

		.palmares-season-card {
			padding: 20px;
			display: grid;
			gap: 20px;
		}

		.palmares-season-card__head {
			display: flex;
			justify-content: space-between;
			align-items: start;
			gap: 16px;
			padding-bottom: 14px;
			border-bottom: 1px solid rgba(255,255,255,0.05);
		}

		.palmares-season-card__eyebrow {
			display: inline-flex;
			font-size: 0.76rem;
			letter-spacing: 0.14em;
			text-transform: uppercase;
			color: #9ed9ff;
		}

		.palmares-season-card__head h2 {
			margin: 6px 0 0;
			font-size: clamp(1.8rem, 3vw, 2.6rem);
			line-height: 1;
		}

		.palmares-season-card__badges {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
			justify-content: flex-end;
			align-items: flex-start;
		}

		.palmares-season-card__state {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 7px 10px;
			border-radius: 999px;
			background: rgba(255,255,255,0.04);
			border: 1px solid rgba(255,255,255,0.06);
			font-size: 0.76rem;
			font-weight: 700;
			line-height: 1;
		}

		.palmares-season-card__state--cerrado {
			background: rgba(246, 199, 104, 0.10);
			border-color: rgba(246, 199, 104, 0.16);
			color: var(--gold);
		}

		.palmares-season-card__state--en-curso {
			background: rgba(83, 184, 255, 0.10);
			border-color: rgba(83, 184, 255, 0.16);
			color: #a8dfff;
		}

		.palmares-season-card__grid {
			display: grid;
			grid-template-columns: minmax(0, 1fr);
			gap: 14px;
		}

		.palmares-champion-hero {
			display: grid;
			grid-template-columns: minmax(0, 1.08fr) minmax(300px, 0.92fr);
			gap: 16px;
			padding: 18px;
			border-radius: 26px;
			background:
				radial-gradient(circle at 12% 18%, rgba(255, 210, 120, 0.28), transparent 34%),
				radial-gradient(circle at 82% 100%, rgba(108, 138, 255, 0.12), transparent 32%),
				linear-gradient(135deg, rgba(255, 216, 136, 0.10), rgba(255,255,255,0.02) 34%, rgba(91, 112, 180, 0.08));
			border: 1px solid rgba(246, 199, 104, 0.24);
			box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 18px 40px rgba(0, 0, 0, 0.14);
		}

		.palmares-champion-hero__content {
			display: grid;
			gap: 8px;
			align-content: start;
		}

		.palmares-champion-hero__title {
			display: flex;
			align-items: center;
			gap: 14px;
			min-width: 0;
		}

		.palmares-champion-hero__avatars {
			display: flex;
			align-items: center;
			flex-shrink: 0;
		}

		.palmares-champion-hero__eyebrow {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			font-size: 0.78rem;
			font-weight: 800;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: #ffd978;
			text-shadow: 0 0 16px rgba(255, 208, 92, 0.18);
		}

		.palmares-champion-hero__content h3 {
			margin: 0;
			font-size: clamp(1.8rem, 3vw, 2.8rem);
			line-height: 1.02;
			min-width: 0;
			color: #fff5d6;
			text-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
		}

		.palmares-champion-hero__stats {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
		}

		.palmares-champion-hero__stat {
			display: grid;
			gap: 4px;
			padding: 10px 12px;
			min-width: 104px;
			border-radius: 16px;
			background: linear-gradient(180deg, rgba(40, 32, 20, 0.42), rgba(8, 12, 24, 0.22));
			border: 1px solid rgba(255, 214, 120, 0.10);
			box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
		}

		.palmares-champion-hero__stat strong {
			font-size: 1.25rem;
			line-height: 1;
			color: #fff0c2;
		}

		.palmares-champion-hero__stat span {
			font-size: 0.8rem;
			color: var(--muted);
		}

		.palmares-champion-hero__aside {
			display: grid;
			gap: 10px;
			align-content: start;
		}

		.palmares-champion-hero__secondary-head {
			display: grid;
			gap: 4px;
			padding: 4px 2px 0;
		}

		.palmares-champion-hero__secondary-label {
			font-size: 0.72rem;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: rgba(255, 221, 151, 0.72);
		}

		.palmares-champion-hero__secondary-head p {
			margin: 0;
			font-size: 0.84rem;
			line-height: 1.35;
			color: var(--muted);
		}

		.palmares-champion-hero__avatar--stacked {
			width: 68px;
			height: 68px;
			border-radius: 22px;
			flex: 0 0 68px;
			border-color: rgba(255, 211, 111, 0.34);
			box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18), 0 0 0 1px rgba(255, 227, 166, 0.08);
		}

		.palmares-champion-hero__avatar--stacked + .palmares-champion-hero__avatar--stacked {
			margin-left: -12px;
		}

		.palmares-block--scorers {
			padding-top: 2px;
		}

		.palmares-champion-hero__avatar {
			width: 64px;
			height: 64px;
			border-radius: 20px;
			object-fit: cover;
			background: linear-gradient(135deg, #1d2949, #0f162a);
			border: 1px solid rgba(255, 255, 255, 0.08);
			flex: 0 0 64px;
		}

		.palmares-block {
			display: grid;
			gap: 14px;
		}

		.palmares-block__head h3 {
			margin: 0 0 6px;
			font-size: 1.2rem;
		}

		.palmares-block__head p {
			margin: 0;
			color: var(--muted);
			font-size: 0.9rem;
		}

		.palmares-podium-grid,
		.palmares-podium-secondary {
			display: grid;
			gap: 12px;
		}

		.palmares-podium-secondary {
			align-content: start;
		}

		.palmares-podium-secondary--hero {
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 10px;
		}

		.palmares-podium-card {
			display: grid;
			gap: 12px;
			padding: 16px;
			border-radius: 20px;
			background: rgba(255,255,255,0.03);
			border: 1px solid rgba(255,255,255,0.05);
		}

		.palmares-podium-card--1 {
			background: linear-gradient(180deg, rgba(246, 199, 104, 0.12), rgba(255,255,255,0.03));
			border-color: rgba(246, 199, 104, 0.16);
		}

		.palmares-podium-card--secondary {
			background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.025));
		}

		.palmares-podium-card--hero {
			padding: 12px;
			border-radius: 18px;
			background: linear-gradient(180deg, rgba(15, 21, 39, 0.54), rgba(8, 12, 24, 0.34));
			border-color: rgba(255,255,255,0.045);
		}

		.palmares-podium-card__head {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
		}

		.palmares-podium-card__label {
			font-size: 0.76rem;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--muted);
		}

		.palmares-podium-card__badge {
			display: inline-flex;
			align-items: center;
			padding: 8px 10px;
			border-radius: 999px;
			background: rgba(255,255,255,0.06);
			font-size: 0.78rem;
			font-weight: 800;
		}

		.palmares-podium-card__body {
			display: grid;
			gap: 10px;
		}

		.palmares-podium-card__body--hero {
			gap: 8px;
		}

		.palmares-podium-mini-entry {
			display: flex;
			align-items: center;
			gap: 10px;
			min-width: 0;
		}

		.palmares-podium-mini-entry__avatar {
			width: 42px;
			height: 42px;
			border-radius: 14px;
			object-fit: cover;
			background: linear-gradient(135deg, #1d2949, #0f162a);
			border: 1px solid rgba(255,255,255,0.08);
			flex: 0 0 42px;
		}

		.palmares-podium-mini-entry div {
			display: grid;
			gap: 2px;
			min-width: 0;
		}

		.palmares-podium-mini-entry strong {
			font-size: 0.96rem;
			line-height: 1.1;
		}

		.palmares-podium-mini-entry span {
			font-size: 0.8rem;
			color: var(--muted);
		}

		.palmares-entry {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			padding: 12px 0;
			border-top: 1px solid rgba(255,255,255,0.05);
		}

		.palmares-entry:first-child { border-top: 0; padding-top: 0; }
		.palmares-entry:last-child { padding-bottom: 0; }

		.palmares-entry__player {
			display: flex;
			align-items: center;
			gap: 12px;
			min-width: 0;
		}

		.palmares-entry__avatar {
			width: 50px;
			height: 50px;
			border-radius: 16px;
			object-fit: cover;
			background: linear-gradient(135deg, #1d2949, #0f162a);
			border: 1px solid rgba(255, 255, 255, 0.08);
			flex: 0 0 50px;
		}

		.palmares-entry__info {
			display: grid;
			gap: 4px;
			min-width: 0;
		}

		.palmares-entry__info strong { font-size: 1rem; }
		.palmares-entry__info span,
		.palmares-entry__meta {
			font-size: 0.86rem;
			color: var(--muted);
		}

		.palmares-scorers {
			display: grid;
			gap: 14px;
		}

		.palmares-scorers__featured,
		.palmares-top-scorers {
			display: grid;
			gap: 10px;
			padding: 13px 15px;
			border-radius: 20px;
			background: rgba(255,255,255,0.03);
			border: 1px solid rgba(255,255,255,0.05);
		}

		.palmares-scorers__featured {
			background:
				radial-gradient(circle at top right, rgba(83, 184, 255, 0.16), transparent 40%),
				linear-gradient(180deg, rgba(83, 184, 255, 0.10), rgba(255,255,255,0.03));
			border-color: rgba(83, 184, 255, 0.16);
		}

		.palmares-scorers__label {
			font-size: 0.76rem;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--muted);
		}

		.palmares-scorers__featured-list {
			display: grid;
			gap: 12px;
		}

		.palmares-scorers__featured-item {
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.palmares-scorers__featured-item div {
			display: grid;
			gap: 2px;
		}

		.palmares-scorers__featured-item strong {
			font-size: 1.05rem;
		}

		.palmares-scorers__featured-goals {
			font-size: 1.65rem !important;
			font-weight: 900;
			line-height: 1;
			color: #ccecff !important;
		}

		.palmares-scorers__featured-item span {
			font-size: 0.9rem;
			color: var(--muted);
		}

		.palmares-top-scorers__row {
			display: grid;
			grid-template-columns: 34px minmax(0, 1fr) auto;
			gap: 12px;
			align-items: center;
			padding: 9px 0;
			border-top: 1px solid rgba(255,255,255,0.05);
		}

		.palmares-top-scorers__row:first-of-type { border-top: 0; padding-top: 0; }
		.palmares-top-scorers__rank {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 34px;
			height: 34px;
			border-radius: 12px;
			background: rgba(255,255,255,0.05);
			font-weight: 800;
		}
		.palmares-top-scorers__name { font-weight: 600; }
		.palmares-top-scorers__goals {
			font-weight: 800;
			color: var(--gold);
		}

		.palmares-top-scorers {
			background: rgba(255,255,255,0.02);
		}

		.empty-state {
			padding: 42px 18px;
			text-align: center;
			color: var(--muted);
		}

		.empty-state strong {
			display: block;
			margin-bottom: 8px;
			color: var(--text);
			font-size: 1rem;
		}

		.empty-state--panel { padding: 52px 18px; }
		.empty-state--soft {
			padding: 24px 18px;
			border-radius: 16px;
			background: rgba(255,255,255,0.022);
			border: 1px solid rgba(255,255,255,0.05);
		}

		@media (max-width: 1040px) {
			.palmares-champion-hero { grid-template-columns: 1fr; }
			.palmares-podium-secondary--hero { grid-template-columns: 1fr 1fr; }
			.palmares-season-card__grid { grid-template-columns: 1fr; }
		}

		@media (max-width: 760px) {
			.app-shell { width: min(calc(100% - 20px), var(--max-width)); padding-top: 20px; }
			.hero { margin-bottom: 14px; }
			.tabs {
				display: flex;
				flex-wrap: nowrap;
				overflow-x: auto;
				width: 100%;
				padding: 6px;
				margin-bottom: 14px;
				-webkit-overflow-scrolling: touch;
				scrollbar-width: none;
			}
			.tabs::-webkit-scrollbar { display: none; }
			.tab {
				flex: 0 0 auto;
				white-space: nowrap;
				padding: 10px 14px;
				font-size: 0.92rem;
			}
			.palmares-season-card { padding: 16px; }
			.palmares-season-card__head { flex-direction: column; align-items: stretch; }
			.palmares-season-card__badges { justify-content: flex-start; }
			.palmares-season-card__head h2 { font-size: clamp(1.7rem, 8vw, 2.2rem); }
			.palmares-champion-hero {
				padding: 16px;
				gap: 14px;
				border-radius: 22px;
			}
			.palmares-champion-hero__title { align-items: flex-start; }
			.palmares-champion-hero__title h3 { font-size: clamp(1.7rem, 8vw, 2.25rem); }
			.palmares-champion-hero__title { gap: 12px; }
			.palmares-champion-hero__eyebrow { font-size: 0.72rem; }
			.palmares-podium-secondary--hero { grid-template-columns: 1fr; }
			.palmares-champion-hero__stats { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
			.palmares-champion-hero__stat {
				min-width: 0;
				padding: 10px;
				border-radius: 14px;
			}
			.palmares-champion-hero__stat strong { font-size: 1.1rem; }
			.palmares-champion-hero__stat span { font-size: 0.76rem; }
			.palmares-champion-hero__secondary-head { padding-top: 0; }
			.palmares-podium-card--hero {
				padding: 10px;
				border-radius: 16px;
			}
			.palmares-podium-card__head { gap: 10px; }
			.palmares-podium-card__label,
			.palmares-scorers__label { font-size: 0.72rem; }
			.palmares-podium-card__badge {
				padding: 7px 9px;
				font-size: 0.74rem;
			}
			.palmares-podium-mini-entry span {
				font-size: 0.78rem;
				line-height: 1.35;
			}
			.palmares-scorers { gap: 12px; }
			.palmares-scorers__featured,
			.palmares-top-scorers {
				padding: 12px 14px;
				border-radius: 18px;
			}
			.palmares-scorers__featured-item strong { font-size: 1rem; }
			.palmares-scorers__featured-goals { font-size: 1.45rem !important; }
			.palmares-top-scorers__row { gap: 10px; }
			.palmares-entry { flex-direction: column; align-items: stretch; }
			.palmares-entry__meta { align-self: flex-start; }
		}

		@media (max-width: 520px) {
			.hero h1 { font-size: clamp(2rem, 10vw, 2.6rem); }
			.palmares-shell { gap: 14px; }
			.palmares-season-card {
				padding: 14px;
				gap: 16px;
			}
			.palmares-season-card__badges { gap: 6px; }
			.palmares-season-card__state {
				padding: 6px 9px;
				font-size: 0.72rem;
			}
			.palmares-champion-hero {
				padding: 14px;
				gap: 12px;
				border-radius: 20px;
			}
			.palmares-champion-hero__avatar--stacked {
				width: 60px;
				height: 60px;
				flex: 0 0 60px;
				border-radius: 18px;
			}
			.palmares-champion-hero__avatar--stacked + .palmares-champion-hero__avatar--stacked {
				margin-left: -10px;
			}
			.palmares-champion-hero__title h3 { font-size: clamp(1.5rem, 9vw, 2rem); }
			.palmares-champion-hero__stats { grid-template-columns: 1fr; }
			.palmares-podium-mini-entry__avatar {
				width: 38px;
				height: 38px;
				flex: 0 0 38px;
			}
			.palmares-podium-mini-entry strong { font-size: 0.9rem; }
			.palmares-scorers__featured-item {
				align-items: flex-start;
			}
			.palmares-entry__avatar {
				width: 44px;
				height: 44px;
				flex: 0 0 44px;
			}
			.palmares-top-scorers__row {
				grid-template-columns: 30px minmax(0, 1fr) auto;
				padding: 8px 0;
			}
			.palmares-top-scorers__rank {
				width: 30px;
				height: 30px;
				border-radius: 10px;
			}
		}
	</style>
</head>
<body>
	<main class="app-shell">
		<section class="hero" aria-label="Encabezado principal">
			<h1>Cancha Gonsa ⚽</h1>
		</section>

		<nav class="tabs" aria-label="Secciones del sitio">
			<a class="tab" href="./tabla.html" aria-selected="false">Tabla General</a>
			<a class="tab" href="./Goleadores.html" aria-selected="false">Goleadores</a>
