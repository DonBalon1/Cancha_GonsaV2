<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cancha Gonsa | Jugadores</title>
	<style>
		:root {
			--bg: #0b1020;
			--panel: rgba(19, 26, 46, 0.88);
			--line: rgba(110, 142, 198, 0.14);
			--text: #eef3ff;
			--muted: #8f9ab8;
			--green-soft: #7ce7a2;
			--green: #35c759;
			--yellow: #f4c430;
			--red: #ff5d5d;
			--blue: #53b8ff;
			--shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
			--radius-xl: 24px;
			--radius-lg: 18px;
			--radius-md: 14px;
			--radius-sm: 10px;
			--max-width: 1400px;
		}

		* { box-sizing: border-box; }
		html { color-scheme: dark; }
		body {
			margin: 0;
			min-height: 100vh;
			font-family: Inter, "Segoe UI", Roboto, sans-serif;
			background:
				radial-gradient(circle at top, rgba(83, 184, 255, 0.12), transparent 30%),
				linear-gradient(180deg, #09101e 0%, #0b1020 100%);
			color: var(--text);
		}
		a { color: inherit; text-decoration: none; }

		.app-shell {
			width: min(calc(100% - 32px), var(--max-width));
			margin: 0 auto;
			padding: 28px 0 40px;
		}

		.hero { margin-bottom: 18px; }
		.hero h1 { margin: 0; font-size: clamp(2.2rem, 4vw, 3.4rem); line-height: 1; }

		.tabs {
			display: inline-flex;
			gap: 8px;
			padding: 8px;
			margin-bottom: 20px;
			flex-wrap: wrap;
			border-radius: 999px;
			border: 1px solid var(--line);
			background: rgba(19, 26, 46, 0.72);
			backdrop-filter: blur(16px);
		}

		.tab {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border-radius: 999px;
			padding: 11px 18px;
			background: transparent;
			color: var(--muted);
			font: inherit;
			transition: background 0.2s ease, color 0.2s ease;
		}

		.tab[aria-selected="true"] {
			background: linear-gradient(135deg, rgba(83, 184, 255, 0.16), rgba(83, 184, 255, 0.08));
			color: var(--text);
			box-shadow: inset 0 0 0 1px rgba(83, 184, 255, 0.18);
		}

		.panel {
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: var(--radius-xl);
			box-shadow: var(--shadow);
			backdrop-filter: blur(18px);
		}

		.filters-bar {
			display: flex;
			align-items: end;
			gap: 14px;
			padding: 18px 18px 0;
			flex-wrap: wrap;
		}

		.filter-field {
			display: grid;
			gap: 8px;
			min-width: 210px;
		}
		.filter-field--compact { min-width: 150px; }

		.filter-field--player {
			flex: 1 1 320px;
			min-width: min(100%, 320px);
		}

		.filter-field label {
			font-size: 0.76rem;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: #86bef8;
		}

		.filter-select {
			width: 100%;
			padding: 12px 14px;
			border-radius: 14px;
			border: 1px solid rgba(83, 184, 255, 0.14);
			background: rgba(8, 14, 26, 0.92);
			color: var(--text);
			font: inherit;
			outline: none;
			transition: border-color 0.2s ease, box-shadow 0.2s ease;
		}

		.filter-select:focus {
			border-color: rgba(83, 184, 255, 0.45);
			box-shadow: 0 0 0 3px rgba(83, 184, 255, 0.12);
		}

		.filters-summary {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
			margin-left: auto;
		}

		.filter-chip {
			padding: 10px 12px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.035);
			border: 1px solid rgba(255, 255, 255, 0.06);
			color: var(--muted);
			font-size: 0.88rem;
		}

		.filter-chip strong { color: var(--text); }
		.player-shell { display: grid; gap: 18px; padding: 18px; }

		.player-hero {
			display: grid;
			gap: 20px;
			padding: 22px;
			align-items: start;
		}
		.player-hero__summary {
			display: grid;
			gap: 12px;
		}

		.player-hero__main {
			display: flex;
			align-items: center;
			gap: 16px;
			min-width: 0;
		}

		.player-hero__avatar {
			width: 86px;
			height: 86px;
			border-radius: 24px;
			object-fit: cover;
			background: linear-gradient(135deg, #1d2949, #0f162a);
			border: 1px solid rgba(255, 255, 255, 0.08);
			flex: 0 0 86px;
		}

		.player-hero__copy { min-width: 0; display: grid; gap: 10px; }
		.player-hero__eyebrow {
			font-size: 0.76rem;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: #86bef8;
		}
		.player-hero__name {
			margin: 0;
			font-size: clamp(1.6rem, 3vw, 2.4rem);
			line-height: 1.05;
		}
		.player-hero__meta {
			margin: 0;
			color: var(--muted);
			font-size: 0.95rem;
			max-width: 72ch;
		}

		.summary-badges {
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 12px;
		}
		.summary-badge {
			display: grid;
			gap: 8px;
			padding: 14px 16px;
			border-radius: 18px;
			background: rgba(255, 255, 255, 0.03);
			border: 1px solid rgba(255, 255, 255, 0.06);
		}
		.summary-badge__label {
			font-size: 0.74rem;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			color: var(--muted);
		}
		.summary-badge__value {
			font-size: 1.45rem;
			font-weight: 800;
			line-height: 1;
		}
		.summary-badge__detail {
			font-size: 0.86rem;
			color: var(--muted);
			line-height: 1.3;
		}
		.summary-badge__detail--accent {
			font-size: 0.92rem;
			font-weight: 600;
			color: #cfd9f3;
		}

		.metrics-layout {
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 14px;
		}
		.metrics-layout--stack {
			grid-template-columns: 1fr;
			align-content: start;
		}
		.metric-group {
			padding: 18px;
			display: grid;
			gap: 16px;
		}
		.metric-group__header {
			display: grid;
			gap: 6px;
		}
		.metric-group__header h3 {
			margin: 0;
			font-size: 1rem;
		}
		.metric-group__header p {
			margin: 0;
			color: var(--muted);
			font-size: 0.88rem;
			line-height: 1.45;
		}
		.metric-group__grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 12px;
			align-content: start;
		}
		.metric-group__grid--participacioneimpacto {
			grid-template-columns: 1fr;
		}
		.stat-card {
			padding: 16px;
			border-radius: var(--radius-lg);
			background: rgba(255, 255, 255, 0.025);
			border: 1px solid rgba(255, 255, 255, 0.05);
			display: grid;
			gap: 10px;
		}
		.stat-card--compact { min-height: 108px; align-content: start; }
		.stat-card__label {
			font-size: 0.76rem;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			color: var(--muted);
		}
		.stat-card__value {
			font-size: 1.35rem;
			font-weight: 800;
			line-height: 1.05;
		}

		.metric-good { color: var(--green-soft); }
		.metric-good-soft { color: #a4f2bf; }
		.metric-mid { color: var(--yellow); }
		.metric-bad { color: #ff8b8b; }
		.metric-very-good { color: #63d2ff; }
		.metric-warn { color: #ffd76b; }
		.metric-neutral { color: var(--text); }

		.form-section-layout {
			display: grid;
			grid-template-columns: 1fr;
			gap: 18px;
			align-items: start;
		}
		.form-panel { padding: 18px; }
		.form-compact-panel {
			padding: 18px;
		}
		.section-head--inline {
			display: flex;
			justify-content: space-between;
			align-items: flex-end;
			gap: 14px;
			flex-wrap: wrap;
		}
		.section-head--inline p,
		.section-head p {
			margin: 0;
			color: var(--muted);
			font-size: 0.9rem;
			line-height: 1.45;
		}
		.section-head--compact {
			display: grid;
			gap: 6px;
			margin-bottom: 14px;
		}
		.section-head--compact p {
			margin: 0;
			color: var(--muted);
			font-size: 0.9rem;
			line-height: 1.45;
		}

		.form-compact-list {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 12px;
			border: none;
			background: transparent;
			border-radius: 16px;
		}
		.form-compact-row {
			display: grid;
			gap: 10px;
			padding: 16px;
			background: linear-gradient(180deg, rgba(255,255,255,0.038), rgba(255,255,255,0.022));
			border: 1px solid rgba(255,255,255,0.065);
			border-radius: 16px;
			box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
		}
		.form-compact-row__head {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			flex-wrap: wrap;
		}
		.form-compact-row__label {
			font-size: 0.8rem;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			color: #cfd9f3;
		}
		.form-compact-row__hint {
			font-size: 0.8rem;
			color: #9fb2d8;
		}
		.form-compact-row__content {
			min-height: 34px;
			display: flex;
			align-items: center;
		}

		.performance-section {
			display: grid;
			gap: 16px;
		}
		.performance-header {
			display: flex;
			justify-content: space-between;
			align-items: flex-end;
			gap: 18px;
			padding: 18px;
			flex-wrap: wrap;
		}
		.performance-header__copy {
			display: grid;
			gap: 4px;
			max-width: 72ch;
			padding-left: 14px;
			border-left: 3px solid rgba(83, 184, 255, 0.42);
		}
		.performance-header__eyebrow {
			font-size: 0.74rem;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: #86bef8;
		}
		.performance-header__copy h3 {
			margin: 0;
			font-size: clamp(1.35rem, 2vw, 1.7rem);
			line-height: 1.1;
		}
		.performance-header__meta {
			display: grid;
			gap: 6px;
			justify-items: end;
		}
		.performance-header__count {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 10px 14px;
			border-radius: 999px;
			background: rgba(83, 184, 255, 0.08);
			border: 1px solid rgba(83, 184, 255, 0.16);
			color: #dfe9ff;
			font-size: 0.9rem;
			font-weight: 600;
		}
		.performance-header__subtext {
			font-size: 0.84rem;
			color: var(--muted);
		}

		.performance-layout {
			display: grid;
			grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.95fr);
			gap: 18px;
		}
		.history-panel { min-width: 0; }
		.detail-panel { padding: 18px; }
		.section-head { margin-bottom: 14px; }
		.section-head h3 { margin: 0; font-size: 1.05rem; }
		.section-head--split {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 14px;
			flex-wrap: wrap;
		}
		.history-summary-chip {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 8px 14px;
			border-radius: 999px;
			background: rgba(255,255,255,0.04);
			border: 1px solid rgba(255,255,255,0.06);
		}
		.history-summary-chip__separator {
			color: rgba(255,255,255,0.28);
			font-size: 0.88rem;
			font-weight: 700;
		}
		.history-summary-chip__value {
			font-size: 1rem;
			font-weight: 700;
		}
		.history-summary-chip__value--win { color: var(--green-soft); }
		.history-summary-chip__value--draw { color: var(--yellow); }
		.history-summary-chip__value--loss { color: #ff8b8b; }

		@media (max-width: 900px) {
			.performance-header__copy h3 {
				font-size: 1.4rem;
			}
			.performance-header__copy {
				padding-left: 12px;
			}
		}

		.recent-grid { display: grid; gap: 14px; }
		.recent-card {
			padding: 16px;
			border-radius: var(--radius-lg);
			background: rgba(255,255,255,0.025);
			border: 1px solid rgba(255,255,255,0.05);
			display: grid;
			gap: 12px;
			align-content: start;
		}
		.recent-card__label {
			font-size: 0.8rem;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: var(--muted);
		}
		.recent-card--compact {
			align-content: start;
			min-height: 150px;
		}
		.recent-card__stats {
			display: grid;
			gap: 8px;
			align-content: start;
		}
		.recent-card__stats--streaks { gap: 10px; }
		.recent-mini {
			display: flex;
			justify-content: space-between;
			gap: 12px;
			padding: 10px 12px;
			border-radius: 12px;
			background: rgba(255,255,255,0.04);
			color: var(--muted);
			font-size: 0.88rem;
		}
		.recent-mini strong {
			color: var(--text);
			font-size: 1rem;
		}

		.form-dots, .goal-dots {
			display: inline-flex;
			gap: 10px;
			flex-wrap: wrap;
			align-items: center;
			justify-content: flex-start;
		}
		.dot {
			width: 14px;
			height: 14px;
			border-radius: 50%;
			display: inline-block;
			box-shadow: 0 0 0 3px rgba(255,255,255,0.03);
		}
		.dot--green { background: var(--green); }
		.dot--yellow { background: var(--yellow); }
		.dot--red { background: var(--red); }
		.dot--neutral { background: rgba(255,255,255,0.22); }

		.goal-dot {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-width: 30px;
			height: 30px;
			padding: 0 9px;
			border-radius: 999px;
			font-size: 0.82rem;
			font-weight: 700;
			background: rgba(255,255,255,0.055);
			border: 1px solid rgba(255,255,255,0.06);
		}
		.goal-dot--neutral { color: rgba(255,255,255,0.28); }

		.history-list { display: grid; gap: 10px; }
		.history-row {
			display: grid;
			grid-template-columns: minmax(0, 1fr) auto auto;
			gap: 12px;
			align-items: center;
			padding: 14px 16px;
			border-radius: 16px;
			background: rgba(255,255,255,0.022);
			border: 1px solid rgba(255,255,255,0.05);
		}
		.history-row__meta,
		.history-row__summary { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
		.history-row__meta { min-width: 0; }
		.history-row__date { color: #86bef8; font-size: 0.85rem; }
		.history-row__match { font-weight: 700; }
		.history-score { font-weight: 800; letter-spacing: -0.04em; }
		.history-mini { color: var(--muted); font-size: 0.88rem; }
		.history-mini--goal { color: #ffd76b; }
		.history-mini--points { color: #a4f2bf; }
		.history-link {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 10px 14px;
			border-radius: 14px;
			border: 1px solid rgba(83, 184, 255, 0.18);
			background: linear-gradient(135deg, rgba(83, 184, 255, 0.16), rgba(83, 184, 255, 0.08));
			font-weight: 600;
			white-space: nowrap;
		}
		.history-pill {
			display: inline-flex;
			padding: 6px 10px;
			border-radius: 999px;
			font-size: 0.78rem;
			font-weight: 700;
		}
		.history-pill--ganador { background: rgba(53, 199, 89, 0.12); color: var(--green-soft); }
		.history-pill--empate { background: rgba(244, 196, 48, 0.12); color: var(--yellow); }
		.history-pill--perdedor { background: rgba(255, 93, 93, 0.12); color: #ff8b8b; }
		.history-pill--neutral { background: rgba(255,255,255,0.06); color: var(--muted); }

		.empty-state {
			padding: 42px 18px;
			text-align: center;
			color: var(--muted);
		}
		.empty-state strong {
			display: block;
			margin-bottom: 8px;
			color: var(--text);
			font-size: 1rem;
		}
		.empty-state--panel { padding: 50px 18px; }

		@media (max-width: 1180px) {
			.summary-badges,
			.metrics-layout { grid-template-columns: repeat(2, minmax(0, 1fr)); }
			.form-section-layout,
			.performance-layout { grid-template-columns: 1fr; }
		}
		@media (max-width: 900px) {
			.filters-summary { width: 100%; margin-left: 0; }
			.summary-badges { grid-template-columns: repeat(2, minmax(0, 1fr)); }
			.section-head--inline,
			.performance-header { align-items: flex-start; }
			.performance-header__meta { justify-items: start; }
		}
		@media (max-width: 700px) {
			.app-shell { width: min(calc(100% - 20px), var(--max-width)); padding-top: 20px; }
			.tabs {
				display: flex;
				flex-wrap: nowrap;
				overflow-x: auto;
				width: 100%;
				padding: 6px;
				margin-bottom: 16px;
				-webkit-overflow-scrolling: touch;
				scrollbar-width: none;
			}
			.tabs::-webkit-scrollbar { display: none; }
			.tab {
				flex: 0 0 auto;
				white-space: nowrap;
				padding: 10px 14px;
				font-size: 0.92rem;
			}
			.filters-bar { padding: 16px 16px 0; gap: 12px; }
			.filter-field,
			.filter-field--player { min-width: 100%; flex-basis: 100%; }
			.filters-summary {
				display: grid;
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 8px;
			}
			.filter-chip {
				padding: 10px 12px;
				font-size: 0.82rem;
				border-radius: 14px;
			}
			.player-shell { padding: 16px; }
			.player-hero {
				padding: 16px;
				gap: 16px;
			}
			.player-hero__main { align-items: flex-start; }
			.player-hero__avatar {
				width: 74px;
				height: 74px;
				flex-basis: 74px;
			}
			.player-hero__copy { gap: 8px; }
			.player-hero__name { font-size: clamp(1.45rem, 6vw, 2rem); }
			.player-hero__meta {
				font-size: 0.88rem;
				line-height: 1.4;
			}
			.metrics-layout,
			.metric-group__grid,
			.summary-badges { grid-template-columns: 1fr; }
			.summary-badges { gap: 10px; }
			.summary-badge {
				padding: 13px 14px;
				gap: 6px;
			}
			.summary-badge__value { font-size: 1.25rem; }
			.metric-group,
			.detail-panel,
			.form-compact-panel,
			.performance-header { padding: 16px; }
			.metric-group__header p,
			.section-head--compact p,
			.section-head p,
			.performance-header__subtext { font-size: 0.84rem; }
			.performance-header { gap: 12px; }
			.performance-header__copy {
				gap: 2px;
				padding-left: 10px;
			}
			.performance-header__count {
				padding: 9px 12px;
				font-size: 0.84rem;
			}
			.history-summary-chip {
				width: 100%;
				justify-content: center;
			}
			.history-row {
				padding: 14px 0;
				gap: 10px;
			}
			.history-row__summary { gap: 8px; }
			.history-link {
				padding: 11px 14px;
				font-size: 0.92rem;
			}
			.history-row { grid-template-columns: 1fr; }
			.history-link { width: 100%; }
			.form-compact-list { grid-template-columns: 1fr; }
			.form-compact-row {
				padding: 14px;
				gap: 8px;
			}
			.recent-card,
			.recent-card--compact { min-height: auto; }
		}
		@media (max-width: 540px) {
			.player-hero__main { flex-direction: column; }
			.player-hero__meta { display: none; }
			.filters-summary { grid-template-columns: 1fr; }
			.metrics-layout,
			.metric-group__grid,
			.summary-badges { grid-template-columns: 1fr; }
			.player-shell { gap: 14px; }
