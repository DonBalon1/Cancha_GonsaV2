<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cancha Gonsa | Inicio</title>
	<style>
		:root {
			--bg: #08101d;
			--panel: rgba(17, 26, 45, 0.84);
			--panel-soft: rgba(255, 255, 255, 0.03);
			--panel-strong: rgba(10, 16, 29, 0.92);
			--line: rgba(122, 168, 255, 0.16);
			--line-strong: rgba(122, 168, 255, 0.24);
			--text: #eef4ff;
			--muted: #97a4c3;
			--blue: #58baff;
			--green: #35c759;
			--yellow: #f4c430;
			--red: #ff5d5d;
			--shadow: 0 28px 80px rgba(0, 0, 0, 0.34);
			--radius-xl: 30px;
			--radius-lg: 22px;
			--radius-md: 16px;
		}

		* {
			box-sizing: border-box;
		}

		html {
			height: 100%;
			color-scheme: dark;
		}

		body {
			margin: 0;
			height: 100%;
			overflow: hidden;
			font-family: Inter, "Segoe UI", Roboto, sans-serif;
			background:
				radial-gradient(circle at top left, rgba(88, 186, 255, 0.18), transparent 28%),
				radial-gradient(circle at bottom right, rgba(53, 199, 89, 0.1), transparent 22%),
				linear-gradient(180deg, #08101d 0%, #0c1423 100%);
			color: var(--text);
		}

		a {
			color: inherit;
			text-decoration: none;
		}

		.page-shell {
			width: min(calc(100% - 32px), 1240px);
			height: 100vh;
			margin: 0 auto;
			padding: 20px 0;
			display: flex;
			align-items: stretch;
		}

		.home-grid {
			width: 100%;
			height: 100%;
			display: grid;
			grid-template-columns: minmax(0, 1.12fr) minmax(360px, 0.88fr);
			gap: 20px;
		}

		.panel {
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: var(--radius-xl);
			backdrop-filter: blur(18px);
			box-shadow: var(--shadow);
		}

		.hero-panel {
			padding: 34px 36px;
			display: grid;
			grid-template-rows: auto auto 1fr;
			gap: 22px;
			min-height: 0;
		}

		.hero-panel h1 {
			margin: 0;
			max-width: 10.5ch;
			font-size: clamp(3.6rem, 6.2vw, 5.9rem);
			line-height: 0.9;
			letter-spacing: -0.075em;
		}

		.hero-actions {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
		}

		.button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-height: 54px;
			padding: 14px 24px;
			border-radius: 18px;
			border: 1px solid transparent;
			font-size: 1rem;
			font-weight: 800;
			transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
		}

		.button--compact {
			min-height: 44px;
			padding: 10px 16px;
			font-size: 0.9rem;
			border-radius: 14px;
		}

		.button:hover {
			transform: translateY(-2px);
		}

		.button--primary {
			background: linear-gradient(135deg, #58baff, #2d8dff);
			color: #08101d;
			box-shadow: 0 22px 42px rgba(45, 141, 255, 0.34);
		}

		.button--secondary {
			background: rgba(255, 255, 255, 0.03);
			border-color: var(--line);
			color: var(--text);
		}

		.leaders-card {
			min-height: 0;
			padding: 18px;
			border-radius: 24px;
			background: rgba(255, 255, 255, 0.03);
			border: 1px solid rgba(255, 255, 255, 0.05);
			display: grid;
			grid-template-rows: auto 1fr;
			gap: 12px;
		}

		.section-kicker {
			margin: 0;
			color: var(--blue);
			font-size: 0.78rem;
			font-weight: 800;
			letter-spacing: 0.14em;
			text-transform: uppercase;
		}

		.section-title {
			margin: 4px 0 0;
			font-size: 1.15rem;
			font-weight: 800;
		}

		.leaders-list {
			display: grid;
			gap: 10px;
			height: 100%;
			grid-auto-rows: minmax(0, 1fr);
			align-content: stretch;
		}

		.leaders-list__item {
			display: grid;
			grid-template-columns: 30px 42px minmax(0, 1.2fr) repeat(3, minmax(54px, auto));
			align-items: center;
			gap: 10px;
			padding: 10px 12px;
			border-radius: 18px;
			background: rgba(255, 255, 255, 0.03);
			border: 1px solid rgba(255, 255, 255, 0.05);
			min-height: 0;
		}

		.leaders-list__rank {
			width: 30px;
			height: 30px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border-radius: 12px;
			background: rgba(88, 186, 255, 0.12);
			border: 1px solid rgba(88, 186, 255, 0.18);
			font-size: 0.85rem;
			font-weight: 800;
		}

		.leaders-list__avatar {
			width: 42px;
			height: 42px;
			border-radius: 14px;
			object-fit: cover;
			background: linear-gradient(135deg, #1d2949, #0f162a);
			border: 1px solid rgba(255, 255, 255, 0.08);
		}

		.leaders-list__identity {
			min-width: 0;
		}

		.leaders-list__identity strong {
			display: block;
			font-size: 0.98rem;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.leaders-list__identity span {
			display: block;
			margin-top: 3px;
			font-size: 0.78rem;
			color: var(--muted);
		}

		.leaders-list__metric {
			display: grid;
			gap: 4px;
			justify-items: center;
			text-align: center;
		}

		.leaders-list__metric span {
			font-size: 0.7rem;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: var(--muted);
		}

		.leaders-list__metric strong {
			font-size: 0.95rem;
		}

		.form-strip {
			display: inline-flex;
			gap: 5px;
			align-items: center;
			justify-content: center;
			flex-wrap: wrap;
		}

		.form-dot {
			width: 9px;
			height: 9px;
			border-radius: 50%;
			display: inline-block;
		}

		.form-dot--win { background: var(--green); }
		.form-dot--draw { background: var(--yellow); }
		.form-dot--loss { background: var(--red); }
		.form-dot--empty { background: rgba(255, 255, 255, 0.14); }

		.side-panel {
			padding: 24px;
			display: grid;
			grid-template-rows: auto 1fr;
			gap: 18px;
			min-height: 0;
		}

		.block-card,
		.editorial-placeholder,
		.loading-state,
		.empty-box {
			padding: 18px;
			border-radius: 22px;
			background: var(--panel-soft);
			border: 1px solid rgba(255, 255, 255, 0.05);
		}

		.block-card {
			display: grid;
			gap: 14px;
		}

		.block-card__head {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
		}

		.block-card__head-main {
			display: grid;
			gap: 4px;
		}

		.block-card__head p,
		.match-preview__meta,
		.editorial-placeholder p,
		.empty-box span,
		.loading-state {
			margin: 0;
			color: var(--muted);
			line-height: 1.5;
		}

		.match-preview {
			display: grid;
			gap: 14px;
		}

		.match-preview__eyebrow {
			font-size: 0.76rem;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--blue);
		}

		.match-preview__score {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 12px;
			padding: 16px 18px;
			border-radius: 20px;
			background: var(--panel-strong);
			border: 1px solid var(--line-strong);
			font-size: clamp(1.9rem, 4vw, 2.8rem);
			font-weight: 900;
			letter-spacing: -0.05em;
		}

		.match-preview__score span {
			color: rgba(255, 255, 255, 0.36);
		}

		.match-preview__stats {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 12px;
		}

		.match-preview__stat {
			padding: 12px;
			border-radius: 16px;
			background: rgba(255, 255, 255, 0.03);
			border: 1px solid rgba(255, 255, 255, 0.05);
		}

		.match-preview__stat span {
			display: block;
			margin-bottom: 6px;
			font-size: 0.72rem;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: var(--muted);
		}

		.match-preview__stat strong {
			display: block;
			font-size: 0.92rem;
			line-height: 1.4;
		}

		.editorial-placeholder {
			min-height: 0;
			display: grid;
			align-content: start;
			gap: 14px;
		}

		.editorial-placeholder__box {
			min-height: 210px;
			border-radius: 20px;
			border: 1px solid rgba(88, 186, 255, 0.18);
			background: linear-gradient(180deg, rgba(88, 186, 255, 0.05), rgba(255, 255, 255, 0.02));
			display: grid;
			align-content: start;
			gap: 16px;
			padding: 20px;
			text-align: left;
			color: var(--muted);
			line-height: 1.6;
		}

		.editorial-story {
			display: grid;
			gap: 14px;
		}

		.editorial-story__label {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 7px 11px;
			border-radius: 999px;
			width: fit-content;
			background: rgba(88, 186, 255, 0.12);
			border: 1px solid rgba(88, 186, 255, 0.18);
			color: var(--blue);
			font-size: 0.72rem;
			font-weight: 800;
			letter-spacing: 0.1em;
			text-transform: uppercase;
		}

		.editorial-story__headline {
			margin: 0;
			font-size: clamp(1.5rem, 2.8vw, 2.15rem);
			line-height: 1.05;
			letter-spacing: -0.04em;
			color: var(--text);
		}

		.editorial-story__body,
		.editorial-story__meta {
			margin: 0;
			font-size: 0.95rem;
			line-height: 1.65;
			color: var(--muted);
		}

		.editorial-story__meta {
			padding-top: 12px;
			border-top: 1px solid rgba(255, 255, 255, 0.08);
		}

		.editorial-story__link {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			width: fit-content;
			font-size: 0.88rem;
			font-weight: 800;
			color: #b4d8ff;
		}

		.empty-box strong {
			display: block;
			margin-bottom: 6px;
			font-size: 1rem;
			color: var(--text);
		}

		@media (max-width: 920px) {
			body {
				height: auto;
				overflow-y: auto;
				overflow-x: hidden;
			}

			.page-shell {
				height: auto;
				min-height: 100vh;
				padding: 18px 0 24px;
			}

			.home-grid {
				height: auto;
				grid-template-columns: 1fr;
			}

			.hero-panel,
			.side-panel {
				min-height: auto;
			}
		}

		@media (max-width: 700px) {
			.page-shell {
				width: min(calc(100% - 20px), 1240px);
			}

			.hero-panel,
			.side-panel {
				padding: 20px;
				border-radius: 24px;
			}

			.hero-panel h1 {
				max-width: none;
				font-size: clamp(2.8rem, 12vw, 4.2rem);
			}

			.hero-actions {
				grid-template-columns: 1fr;
				display: grid;
			}

			.button {
				width: 100%;
			}

			.leaders-list__item {
				grid-template-columns: 30px 40px minmax(0, 1fr);
			}

			.leaders-list__metric {
				grid-column: 2 / -1;
				grid-template-columns: repeat(3, minmax(0, 1fr));
				display: grid;
				justify-items: start;
				gap: 10px;
				padding-top: 6px;
			}

			.match-preview__stats {
				grid-template-columns: 1fr;
			}

			.block-card__head {
				flex-direction: column;
				align-items: flex-start;
			}
		}

		@media (max-width: 520px) {
			.hero-panel,
			.side-panel,
			.leaders-card,
			.block-card,
			.editorial-placeholder,
			.empty-box,
			.loading-state {
				padding: 16px;
			}

			.match-preview__score {
				font-size: clamp(1.6rem, 10vw, 2.2rem);
			}

			.editorial-placeholder__box {
				min-height: 180px;
			}
		}
	</style>
</head>
<body>
	<main class="page-shell">
		<section class="home-grid">
			<section class="panel hero-panel">
				<h1>El mejor torneo del mundo.</h1>

				<div class="hero-actions">
					<a class="button button--primary" href="./tabla.html">Ingresar</a>
				</div>

				<section class="leaders-card">
					<div>
						<p class="section-kicker">Top 3 actual</p>
						<h2 class="section-title">Los que mandan hoy</h2>
					</div>
					<div id="js-leaders-compact" class="leaders-list loading-state">Cargando líderes...</div>
				</section>
			</section>

			<aside class="panel side-panel">
				<section class="block-card">
					<div class="block-card__head">
						<div class="block-card__head-main">
							<p class="section-kicker">Último partido</p>
						</div>
						<a class="button button--secondary button--compact" id="js-last-match-cta" href="./Partidos.html">Ir al resumen</a>
					</div>
					<div id="js-last-match-preview" class="loading-state">Cargando último partido...</div>
				</section>

				<section class="editorial-placeholder">
					<div>
						<p class="section-kicker">Editorial</p>
						<h2 class="section-title">Noticias y clima del torneo</h2>
					</div>
					<div id="js-editorial-story" class="editorial-placeholder__box loading-state">
						Cargando editorial del torneo...
					</div>
				</section>
			</aside>
		</section>
	</main>

	<script src="./lector_datos.js"></script>
	<script src="./index.js"></script>
</body>
</html>
